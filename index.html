// NON-NESTING: congressional districts, MSAs, places (these overlap/cross nesting boundaries)

const GEOGRAPHIES = {
  // --- Nesting ---
  'block': { label: 'Census Block', group: 'nesting', description: 'Smallest geographic unit. Typically a city block.', population: '~50–200 people', vintages: '2010, 2020', note: 'Decennial only. Nests within block group → tract → county → state.', tigerKey: 'TABBLOCK', tigerScope: 'state' },
  'block group': { label: 'Block Group', group: 'nesting', description: 'Cluster of blocks. Smallest unit for ACS data.', population: '~600–3,000 people', vintages: '2010, 2020', note: 'Smallest geography ACS supports (5-year only). Nests within tract.', tigerKey: 'BG', tigerScope: 'state' },
  'tract': { label: 'Census Tract', group: 'nesting', description: 'Subdivision of a county designed to be relatively homogeneous.', population: '~1,200–8,000 people', vintages: '2010, 2020', note: 'Nests within county. Workhorse for neighborhood-level analysis.', tigerKey: 'TRACT', tigerScope: 'state' },
  'county': { label: 'County', group: 'nesting', description: 'County or county-equivalent.', population: 'Highly variable', vintages: 'Updated annually', note: 'Nests within state. Standard for regional analysis.', tigerKey: 'COUNTY', tigerScope: 'national' },
  'state': { label: 'State', group: 'nesting', description: 'U.S. states, DC, and Puerto Rico.', population: 'Highly variable', vintages: 'Stable', note: 'Highest sub-national nesting unit.', tigerKey: 'STATE', tigerScope: 'national' },

  // --- Non-nesting ---
  'place': { label: 'Place', group: 'nonnesting', description: 'Cities, towns, CDPs (Census Designated Places). Can cross county lines.', population: 'Highly variable', vintages: 'Updated annually', note: 'Use ACS 1-Year only for places ≥65,000.', tigerKey: 'PLACE', tigerScope: 'state' },
  'cd': { label: 'Congressional District', group: 'nonnesting', description: 'U.S. House districts. Redrawn after each decennial reapportionment.', population: '~760,000 people', vintages: 'Updated each Congress', note: 'Cuts across counties and places.', tigerKey: 'CD', tigerScope: 'national' },
  'metropolitan statistical area/micropolitan statistical area': { label: 'Metro/Micropolitan Area', group: 'nonnesting', description: 'CBSAs — a set of counties forming a regional economy.', population: 'MSA: ≥50,000 core; µSA: 10,000–50,000', vintages: 'Updated annually', note: 'Often crosses state lines. Best for cross-jurisdictional regional analysis.', tigerKey: 'CBSA', tigerScope: 'national' },
};

function recommendDataset({ recency, geoSize, needsBlocks, focus }) {
  if (needsBlocks) return 'dec_pl';
  if (focus === 'race_ethnicity_total') return 'dec_pl';
  if (recency === 'most_current' && geoSize === 'large') return 'acs1';
  return 'acs5';
}

function buildShapefileUrl(geo, year, stateFips) {
  const meta = GEOGRAPHIES[geo];
  if (!meta?.tigerKey) return null;
  const tigerYear = year >= 2020 ? Math.min(year, 2024) : 2019;
  const key = meta.tigerKey;
  const keyLower = key.toLowerCase();
  if (meta.tigerScope === 'national') {
    return { url: `https://www2.census.gov/geo/tiger/TIGER${tigerYear}/${key}/tl_${tigerYear}_us_${keyLower}.zip`, scope: 'National', tigerYear };
  }
  if (!stateFips) return null;
  return { url: `https://www2.census.gov/geo/tiger/TIGER${tigerYear}/${key}/tl_${tigerYear}_${stateFips}_${keyLower}.zip`, scope: STATES.find(s => s.fips === stateFips)?.name || 'State', tigerYear };
}

// Build a single API URL given a filter scope
function buildApiUrl({ dataset, year, geo, varCodes, filterScope, apiKey }) {
  const ds = DATASETS[dataset];
  const varList = ['NAME', ...varCodes].join(',');
  let url = `https://api.census.gov/data/${year}/${ds.apiBase}?get=${varList}&for=${encodeURIComponent(geo)}:*`;

  // filterScope: { type: 'none' | 'state' | 'county' | 'msa', stateFips, countyFips }
  // The 'in=' clause is what nests the query.
  if (filterScope?.type === 'state') {
    url += `&in=state:${filterScope.stateFips}`;
  } else if (filterScope?.type === 'county') {
    // single county
    url += `&in=state:${filterScope.stateFips}%20county:${filterScope.countyFips}`;
  }
  if (apiKey) {
    url += `&key=${encodeURIComponent(apiKey)}`;
  }
  return url;
}

// Determine whether geo requires a state/county filter (Census API nesting rules)
function getRequiredScope(geo) {
  // Returns 'state' (need state), 'state+county' (need both), or 'none'
  if (!geo) return 'none';
  if (['us', 'region', 'division', 'state'].includes(geo)) return 'none';
  if (geo === 'block group' || geo === 'block') return 'state+county'; // API requires both
  // tract, place, county: need at least state
  if (['tract', 'county', 'place'].includes(geo)) return 'state';
  // CD, CBSA: no state required (can query nationally)
  return 'none';
}

function toCSV(rows) {
  return rows.map(row =>
    row.map(cell => {
      const s = String(cell ?? '');
      if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
      return s;
    }).join(',')
  ).join('\n');
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function extractTableId(code) {
  const m = code.match(/^([A-Z]+\d+)_/);
  return m ? m[1] : null;
}

function inferUniverseFromConcept(concept = '') {
  const c = concept.toLowerCase();
  if (c.includes('housing unit')) return 'housing_units';
  if (c.includes('families')) return 'families';
  if (c.includes('households')) return 'households';
  if (c.includes('workers') || c.includes('employed')) return 'workers';
  return 'population';
}

// Sleep helper for backoff
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Fetch one county with retries on transient failures (429 rate limit, 5xx, network errors)
async function fetchOneCountyWithRetry({ dataset, year, geo, varCodes, ref, apiKey, maxAttempts = 3 }) {
  // Build URL — special case: if geography IS "county", we can't nest counties inside counties.
  // Query the county directly by its FIPS instead.
  let url;
  if (geo === 'county') {
    const ds = DATASETS[dataset];
    const varList = ['NAME', ...varCodes].join(',');
    url = `https://api.census.gov/data/${year}/${ds.apiBase}?get=${varList}&for=county:${ref.countyFips}&in=state:${ref.stateFips}`;
    if (apiKey) url += `&key=${encodeURIComponent(apiKey)}`;
  } else {
    url = buildApiUrl({
      dataset, year, geo, varCodes, apiKey,
      filterScope: { type: 'county', stateFips: ref.stateFips, countyFips: ref.countyFips },
    });
  }

  let lastError = null;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        return { ok: true, data, ref };
      }
      // Retry 429 (rate limit) and 5xx (server errors). Bail on 4xx client errors.
      if (res.status === 429 || res.status >= 500) {
        lastError = `HTTP ${res.status}`;
        if (attempt < maxAttempts) {
          await sleep(400 * attempt); // linear backoff: 400ms, 800ms, 1200ms
          continue;
        }
      } else {
        // 4xx other than 429 — won't succeed on retry
        const body = await res.text();
        return { ok: false, ref, error: `HTTP ${res.status}: ${body.slice(0, 160)}` };
      }
    } catch (e) {
      lastError = e.message || 'Network error';
      if (attempt < maxAttempts) {
        await sleep(400 * attempt);
        continue;
      }
    }
  }
  return { ok: false, ref, error: lastError || 'Unknown error' };
}

// Fan-out API: fetches multiple counties sequentially (to avoid rate limits)
// and aggregates results. Reports per-county success/failure.
async function fetchFromMultipleCounties({ dataset, year, geo, varCodes, countyRefs, apiKey, onProgress }) {
  const succeeded = [];
  const failed = [];

  for (let i = 0; i < countyRefs.length; i++) {
    const ref = countyRefs[i];
    onProgress?.(i + 1, countyRefs.length, ref);
    const result = await fetchOneCountyWithRetry({ dataset, year, geo, varCodes, ref, apiKey });
    if (result.ok) {
      succeeded.push(result);
    } else {
      failed.push(result);
    }
    // Small delay between requests to avoid hitting the rate limit
    if (i < countyRefs.length - 1) await sleep(80);
  }

  // Aggregate
  let headers = null;
  const dataRows = [];
  for (const { data } of succeeded) {
    if (!data || data.length < 2) continue;
    if (!headers) headers = data[0];
    for (let i = 1; i < data.length; i++) dataRows.push(data[i]);
  }

  if (!headers) {
    const msg = failed.length
      ? `All ${failed.length} county requests failed. First error: ${failed[0].error}`
      : 'No data returned from any of the selected counties.';
    throw new Error(msg);
  }

  return {
    rows: [headers, ...dataRows],
    succeededCount: succeeded.length,
    failedCount: failed.length,
    failures: failed.map(f => ({ name: f.ref.name, error: f.error })),
  };
}

function CensusExplorer() {
  const [recommendMode, setRecommendMode] = useState(false);
  const [recAnswers, setRecAnswers] = useState({});
  const [selectedDataset, setSelectedDataset] = useState(null);
  const [selectedYear, setSelectedYear] = useState(null);
  const [selectedGeo, setSelectedGeo] = useState(null);

  // Filter scope: how to narrow which geographies are returned
  // Shape: { type: 'state' | 'counties' | 'msa' | 'none', stateFips, countyRefs: [{stateFips, countyFips, name}], msaCode }
  const [filterScope, setFilterScope] = useState({ type: 'none' });

  const [selectedUniverse, setSelectedUniverse] = useState(null);
  const [selectedTable, setSelectedTable] = useState(null);
  const [selectedVars, setSelectedVars] = useState([]);

  const [previewData, setPreviewData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [error, setError] = useState(null);
  const [partialFailures, setPartialFailures] = useState(null); // { failedCount, failures: [{name, error}] }

  // Optional Census API key — raises the 500/day unauthenticated rate limit
  const [apiKey, setApiKeyState] = useState(() => {
    // Try to rehydrate from localStorage; fail silently if unavailable (artifacts don't allow it)
    try { return window.localStorage.getItem('census-atlas-api-key') || ''; } catch { return ''; }
  });
  const [showApiKeyInput, setShowApiKeyInput] = useState(false);
  function setApiKey(v) {
    setApiKeyState(v);
    try {
      if (v) window.localStorage.setItem('census-atlas-api-key', v);
      else window.localStorage.removeItem('census-atlas-api-key');
    } catch { /* localStorage unavailable; non-fatal */ }
  }

  const [varCatalog, setVarCatalog] = useState(null);
  const [catalogLoading, setCatalogLoading] = useState(false);
  const [catalogError, setCatalogError] = useState(null);

  // Tracks which steps the user has manually expanded (overriding auto-collapse).
  // A Set of step numbers (1, 2, 3, 4).
  const [manuallyExpanded, setManuallyExpanded] = useState(() => new Set());
  function toggleExpand(step) {
    setManuallyExpanded(prev => {
      const next = new Set(prev);
      if (next.has(step)) next.delete(step);
      else next.add(step);
      return next;
    });
  }
  function clearManualExpand(step) {
    setManuallyExpanded(prev => {
      if (!prev.has(step)) return prev;
      const next = new Set(prev);
      next.delete(step);
      return next;
    });
  }

  // Refs for scroll-to-section on step transitions
  const step2Ref = useRef(null);
  const step3Ref = useRef(null);
  const step4Ref = useRef(null);

  // Custom smooth-scroll with a slower, gentler ease than the browser default.
  // The browser's `scrollIntoView({behavior: 'smooth'})` is too snappy for this UX.
  function animatedScrollTo(targetY, duration = 900) {
    const startY = window.scrollY;
    const distance = targetY - startY;
    if (Math.abs(distance) < 4) return;
    const startTime = performance.now();
    // Ease-in-out cubic — gentle acceleration and deceleration
    const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    function step(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      window.scrollTo(0, startY + distance * ease(t));
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function scrollToRef(ref) {
    if (!ref?.current) return;
    // Wait for the collapse animation to start before scrolling, so the eye
    // follows the motion of step N collapsing → step N+1 settling into view.
    setTimeout(() => {
      if (!ref.current) return;
      const rect = ref.current.getBoundingClientRect();
      // Account for the sticky header (~80px tall without the progress bar)
      const headerOffset = 80;
      const targetY = window.scrollY + rect.top - headerOffset;
      animatedScrollTo(targetY, 1300);
    }, 280);
  }

  const [showVarSearch, setShowVarSearch] = useState(false);
  const [varSearchQuery, setVarSearchQuery] = useState('');
  const [showExtendedTables, setShowExtendedTables] = useState(false);

  const dataset = selectedDataset ? DATASETS[selectedDataset] : null;
  const availableGeos = dataset ? dataset.geographies.filter(g => GEOGRAPHIES[g]) : [];
  const nestingGeos = availableGeos.filter(g => GEOGRAPHIES[g].group === 'nesting');
  const nonNestingGeos = availableGeos.filter(g => GEOGRAPHIES[g].group === 'nonnesting');

  const requiredScope = getRequiredScope(selectedGeo);
  const isFilterable = requiredScope !== 'none'; // can this geo be filtered at all?

  const canPreview = useMemo(() => {
    if (!selectedDataset || !selectedYear || !selectedGeo || selectedVars.length === 0) return false;
    if (requiredScope === 'none') return true;
    // need a valid filterScope (canPreview is independent of `confirmed`;
    // that only gates auto-collapse of step 3)
    if (filterScope.type === 'state' && filterScope.stateFips) return true;
    if (filterScope.type === 'counties' && filterScope.countyRefs?.length > 0) return true;
    if (filterScope.type === 'msa' && filterScope.msaCodes?.length > 0) return true;
    return false;
  }, [selectedDataset, selectedYear, selectedGeo, selectedVars, filterScope, requiredScope]);

  // Reset cascades
  useEffect(() => {
    setSelectedYear(null); setSelectedGeo(null);
    setFilterScope({ type: 'none' });
    setSelectedUniverse(null); setSelectedTable(null); setSelectedVars([]);
    setPreviewData(null); setVarCatalog(null); setVarSearchQuery('');
    setShowExtendedTables(false);
    if (selectedDataset) {
      clearManualExpand(1);
      scrollToRef(step2Ref);
    }
  }, [selectedDataset]);

  useEffect(() => {
    setSelectedGeo(null); setFilterScope({ type: 'none' });
    setSelectedUniverse(null); setSelectedTable(null); setSelectedVars([]);
    setPreviewData(null); setVarCatalog(null); setVarSearchQuery('');
    setShowExtendedTables(false);
    if (selectedYear) {
      clearManualExpand(2);
      scrollToRef(step3Ref);
    }
  }, [selectedYear]);

  useEffect(() => {
    setFilterScope({ type: 'none' });
    setSelectedUniverse(null); setSelectedTable(null); setSelectedVars([]);
    setPreviewData(null);
    // Don't auto-scroll here — user may still need to set filter scope.
    // The scroll-to-step-4 happens in a separate effect once scope is satisfied.
  }, [selectedGeo]);

  // Scroll to step 4 once geography + (any required) filter scope is satisfied.
  // For multi-select county/MSA modes, requires an explicit "confirmed" flag
  // so the step doesn't auto-collapse after the first selection.
  const stepThreeComplete = useMemo(() => {
    if (!selectedGeo) return false;
    if (requiredScope === 'none') return true;
    if (filterScope.type === 'state' && filterScope.stateFips) return true;
    if (filterScope.type === 'counties' && filterScope.countyRefs?.length > 0) {
      // Single-county mode auto-completes; multi requires user to confirm.
      return filterScope.multi ? !!filterScope.confirmed : true;
    }
    if (filterScope.type === 'msa' && filterScope.msaCodes?.length > 0) {
      return filterScope.multi ? !!filterScope.confirmed : true;
    }
    return false;
  }, [selectedGeo, filterScope, requiredScope]);

  const lastStepThreeComplete = useRef(false);
  useEffect(() => {
    if (stepThreeComplete && !lastStepThreeComplete.current) {
      clearManualExpand(3);
      scrollToRef(step4Ref);
    }
    lastStepThreeComplete.current = stepThreeComplete;
  }, [stepThreeComplete]);

  useEffect(() => {
    if (selectedUniverse && !varCatalog && !catalogLoading && dataset?.hasUniverses) {
      loadVarCatalog();
    }
  }, [selectedUniverse]);

  async function loadVarCatalog() {
    if (varCatalog || catalogLoading || !selectedDataset || !selectedYear) return;
    setCatalogLoading(true); setCatalogError(null);
    try {
      const url = `https://api.census.gov/data/${selectedYear}/${dataset.apiBase}/variables.json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Catalog fetch failed: ${res.status}`);
      const json = await res.json();
      const flat = Object.entries(json.variables || {})
        .filter(([code, v]) =>
          (code.endsWith('E') || code.endsWith('N')) &&
          !['NAME', 'GEO_ID', 'state', 'county', 'tract', 'place', 'block group', 'block'].includes(code) &&
          v.label && v.concept
        )
        .map(([code, v]) => ({
          code,
          label: v.label.replace(/^Estimate!!/, '').replace(/!!/g, ' › '),
          concept: v.concept,
          group: v.group || extractTableId(code),
          tableId: extractTableId(code),
        }));
      setVarCatalog(flat);
    } catch (e) {
      setCatalogError(e.message);
    } finally {
      setCatalogLoading(false);
    }
  }

  // Hard reset — wipe everything back to step 1. Preserves API key.
  function resetAll() {
    setSelectedDataset(null);
    setSelectedYear(null);
    setSelectedGeo(null);
    setFilterScope({ type: 'none' });
    setSelectedUniverse(null);
    setSelectedTable(null);
    setSelectedVars([]);
    setPreviewData(null);
    setError(null);
    setPartialFailures(null);
    setVarCatalog(null);
    setVarSearchQuery('');
    setShowExtendedTables(false);
    setRecommendMode(false);
    setRecAnswers({});
  }

  // Reset starting from a specific step — everything downstream gets cleared
  function resetFromStep(step) {
    if (step <= 1) setSelectedDataset(null);
    if (step <= 2) setSelectedYear(null);
    if (step <= 3) { setSelectedGeo(null); setFilterScope({ type: 'none' }); }
    if (step <= 4) {
      setSelectedUniverse(null);
      setSelectedTable(null);
      setSelectedVars([]);
    }
    setPreviewData(null);
    setError(null);
    setPartialFailures(null);
  }

  async function fetchPreview() {
    if (!canPreview) return;
    setLoading(true); setError(null); setPreviewData(null); setPartialFailures(null);
    setLoadingMsg('Fetching from Census API…');

    try {
      const varCodes = selectedVars.map(v => v.code);

      // Route based on filter type
      if (filterScope.type === 'none' || filterScope.type === 'state') {
        // Single API call
        const url = buildApiUrl({
          dataset: selectedDataset, year: selectedYear, geo: selectedGeo, varCodes, apiKey,
          filterScope: filterScope.type === 'state' ? { type: 'state', stateFips: filterScope.stateFips } : undefined,
        });
        const res = await fetch(url);
        if (!res.ok) {
          const text = await res.text();
          throw new Error(`Census API returned ${res.status}. ${text.slice(0, 200)}`);
        }
        const data = await res.json();
        setPreviewData(data);
      } else if (filterScope.type === 'counties') {
        // Multi-county fan-out (sequential, retried)
        const result = await fetchFromMultipleCounties({
          dataset: selectedDataset, year: selectedYear, geo: selectedGeo, varCodes, apiKey,
          countyRefs: filterScope.countyRefs,
          onProgress: (i, total, ref) => {
            setLoadingMsg(`Fetching county ${i} of ${total}: ${ref.name}…`);
          },
        });
        setPreviewData(result.rows);
        if (result.failedCount > 0) {
          setPartialFailures({ failedCount: result.failedCount, failures: result.failures });
        }
      } else if (filterScope.type === 'msa') {
        const msaCodes = filterScope.msaCodes || (filterScope.msaCode ? [filterScope.msaCode] : []);
        if (msaCodes.length === 0) throw new Error('No MSA selected.');

        // Aggregate counties across all selected MSAs (deduplicating)
        const seen = new Set();
        const countyRefs = [];
        for (const code of msaCodes) {
          const msa = MSA_COUNTIES[code];
          if (!msa) continue;
          for (const fullFips of msa.counties) {
            if (seen.has(fullFips)) continue;
            seen.add(fullFips);
            countyRefs.push({
              stateFips: fullFips.slice(0, 2),
              countyFips: fullFips.slice(2),
              name: `County ${fullFips}`,
            });
          }
        }
        if (countyRefs.length === 0) throw new Error('No counties found for the selected MSAs.');

        const msaLabel = msaCodes.length === 1
          ? (MSA_COUNTIES[msaCodes[0]]?.name.split(',')[0] || 'MSA')
          : `${msaCodes.length} MSAs`;
        const result = await fetchFromMultipleCounties({
          dataset: selectedDataset, year: selectedYear, geo: selectedGeo, varCodes, countyRefs, apiKey,
          onProgress: (i, total, ref) => {
            setLoadingMsg(`Fetching county ${i} of ${total} in ${msaLabel}…`);
          },
        });
        setPreviewData(result.rows);
        if (result.failedCount > 0) {
          setPartialFailures({ failedCount: result.failedCount, failures: result.failures });
        }
      }
    } catch (e) {
      setError(e.message || 'Failed to fetch data.');
    } finally {
      setLoading(false); setLoadingMsg('');
    }
  }

    setSelectedDataset(recommendDataset(recAnswers));

  function toggleVar(v) {
    setSelectedVars(prev => {

      if (exists) return prev.filter(x => x.code !== v.code);
      return [...prev, v];
    });
  }

  const tablesForUniverse = useMemo(() => {
    if (!selectedUniverse) return [];
    const core = CORE_TABLES.filter(t => t.universe === selectedUniverse);
    if (varCatalog && showExtendedTables) {
      const discoveredIds = new Set();
      varCatalog.forEach(v => {
        if (!v.tableId || CORE_TABLE_IDS.has(v.tableId) || discoveredIds.has(v.tableId)) return;
        const inferredUniverse = inferUniverseFromConcept(v.concept);
        if (inferredUniverse === selectedUniverse) discoveredIds.add(v.tableId);
      });
      const extras = [];
      discoveredIds.forEach(tid => {
        const firstVar = varCatalog.find(v => v.tableId === tid);
        if (firstVar) {
          extras.push({ id: tid, name: firstVar.concept.replace(/^[A-Z]+\d+:\s*/, ''), universe: selectedUniverse, subset: '—', topic: 'Extended', priority: 'extended' });
        }
      });
      return [...core, ...extras.sort((a, b) => a.id.localeCompare(b.id))];
    }
    return core;
  }, [selectedUniverse, varCatalog, showExtendedTables]);

  const variablesInTable = useMemo(() => {

  const tablesByTopic = useMemo(() => {

  const filteredCatalog = useMemo(() => {
    if (!varCatalog || !varSearchQuery.trim()) return [];
    const q = varSearchQuery.toLowerCase().trim();
    const tokens = q.split(/\s+/);
    return varCatalog
      .filter(v => {
        const haystack = `${v.code} ${v.label} ${v.concept}`.toLowerCase();
        return tokens.every(t => haystack.includes(t));

      .slice(0, 100);
  }, [varCatalog, varSearchQuery]);

  const varLabelMap = useMemo(() => {

  // For shapefile: pick a representative state if filter is multi-county within one state
  const shapefileStateFips = useMemo(() => {
    if (filterScope.type === 'state') return filterScope.stateFips;
    if (filterScope.type === 'counties' && filterScope.countyRefs?.length > 0) {
      const firstState = filterScope.countyRefs[0].stateFips;
      const allSame = filterScope.countyRefs.every(c => c.stateFips === firstState);
      return allSame ? firstState : null;
    }
    if (filterScope.type === 'msa') {
      const codes = filterScope.msaCodes || (filterScope.msaCode ? [filterScope.msaCode] : []);
      if (codes.length === 0) return null;
      // Collect all counties across all selected MSAs and check state consistency
      const allFips = [];
      for (const code of codes) {
        const msa = MSA_COUNTIES[code];
        if (msa) allFips.push(...msa.counties);
      }
      if (allFips.length === 0) return null;
      const firstState = allFips[0].slice(0, 2);
      const allSame = allFips.every(c => c.slice(0, 2) === firstState);
      return allSame ? firstState : null;
    }
    return null;
  }, [filterScope]);

        .serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
        .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        .hairline { border-color: #d6d3d1; }
        .hairline-strong { border-color: #1c1917; }
        .lift { transition: all 180ms cubic-bezier(0.4, 0, 0.2, 1); }

        .fadein { animation: fadein 320ms ease-out; }
        @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

           since Tailwind transition-all does not always cover it */

function canContinueToVariables({ selectedGeo, requiredScope, filterScope }) {
  if (!selectedGeo) return false;
  if (requiredScope === 'none') return true;
  if (filterScope.type === 'state' && filterScope.stateFips) return true;
  if (filterScope.type === 'counties' && filterScope.countyRefs?.length > 0) return true;
  if (filterScope.type === 'msa' && filterScope.msaCodes?.length > 0) return true;
  return false;
}

function FilterScopePicker({ geo, requiredScope, filterScope, setFilterScope }) {
  // Available filter modes depend on the geography
  // - tract, block group, block, county, place: state (required), counties (refine), msa (multi-county)
  // For county: state is enough (county *is* the filter in that case, but user can still choose a state subset)
  // - cd, cbsa: state optional (these are not nested, but we allow state filtering for browsing)

  const isBGorBlock = geo === 'block group' || geo === 'block';
  const isTractOrCounty = geo === 'tract' || geo === 'county';
  const isPlace = geo === 'place';

  // Filter modes to offer
  const modes = [];
  if (requiredScope !== 'none') {
    modes.push({ key: 'state', label: 'All in a state', description: 'Standard state-wide pull.', icon: MapPin });
    if (isBGorBlock || isTractOrCounty) {
      modes.push({ key: 'counties', label: 'Specific counties', description: 'One or more counties across one or more states.', icon: Network });
      modes.push({ key: 'msa', label: 'Within an MSA', description: 'All counties in a metro/micropolitan area.', icon: GitBranch });
    }
  }

  return (
    <div className="mt-5 fadein">
      <div className="flex items-center gap-2 mb-3">
        <Network className="w-3.5 h-3.5 text-stone-700" strokeWidth={1.5} />
        <div className="mono text-[10px] uppercase tracking-widest text-stone-700">Filter Scope</div>
        <span className="h-px flex-1 bg-stone-200" />
      </div>
      <div className="text-[11px] text-stone-500 mb-3 leading-relaxed">
        {isBGorBlock
          ? `Block groups and blocks require a state+county scope. Choose how you want to define the area.`
          : `Narrow your query to a specific area. Smaller scopes return faster.`}
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
        {modes.map(m => {
          const Icon = m.icon;
          const active = filterScope.type === m.key;
          return (
            <button key={m.key} onClick={() => setFilterScope({ type: m.key })}
              className={`text-left p-3 border lift rounded-sm ${active ? 'hairline-strong bg-white shadow-sm' : 'hairline bg-white/60 hover:bg-white'}`}>
              <div className="flex items-start gap-2">
                <Icon className="w-3.5 h-3.5 mt-0.5 text-stone-700 flex-shrink-0" strokeWidth={1.5} />
                <div>
                  <div className="text-sm text-stone-900">{m.label}</div>
                  <div className="text-[11px] text-stone-500 mt-0.5 leading-snug">{m.description}</div>
                </div>
              </div>
            </button>
          );
        })}
      </div>

      {filterScope.type === 'state' && (
        <div className="fadein">
          <label className="mono text-[10px] uppercase tracking-widest text-stone-500 block mb-2">State</label>
          <select value={filterScope.stateFips || ''} onChange={e => setFilterScope({ type: 'state', stateFips: e.target.value })}

      )}

      {(filterScope.type === 'counties' || filterScope.type === 'msa') && (
        <SingleOrMultiToggle

// Toggle between "single" and "multiple" selection modes for counties/MSAs.
// Renders two options; selecting one sets filterScope.multi accordingly.
function SingleOrMultiToggle({ filterScope, setFilterScope, label, singleLabel, multiLabel }) {
  const currentMulti = filterScope.multi;

  function pick(multi) {
    // Switching mode clears any current selections and unconfirms
    setFilterScope({
      type: filterScope.type,
      multi,
      confirmed: false,
      countyRefs: [],
      msaCodes: [],

  return (
    <div className="fadein mb-4">

      <div className="grid grid-cols-2 gap-2">

          onClick={() => pick(false)}
          className={`text-left p-3 border lift rounded-sm ${currentMulti === false ? 'hairline-strong bg-white shadow-sm' : 'hairline bg-white/60 hover:bg-white'}`}
        >
          <div className="text-sm text-stone-900">{singleLabel}</div>
          <div className="text-[11px] text-stone-500 mt-0.5 leading-snug">Pick one and continue.</div>
        </button>
        <button
          onClick={() => pick(true)}
          className={`text-left p-3 border lift rounded-sm ${currentMulti === true ? 'hairline-strong bg-white shadow-sm' : 'hairline bg-white/60 hover:bg-white'}`}
        >
          <div className="text-sm text-stone-900">{multiLabel}</div>
          <div className="text-[11px] text-stone-500 mt-0.5 leading-snug">Pick several, then confirm when done.</div>
        </button>
      </div>
    </div>
  );
}

function CountyMultiPicker({ countyRefs, setCountyRefs, multi, confirmed, onConfirm, onEditAgain }) {
  const [pickerState, setPickerState] = useState('');
  const [countyCache, setCountyCache] = useState({}); // { stateFips: [{fips, name}, ...] }
  const [statusByState, setStatusByState] = useState({}); // { stateFips: 'loading' | 'ready' | 'error' }
  const [errorByState, setErrorByState] = useState({});
  const [countySearch, setCountySearch] = useState('');

  // Reset search when user switches state
  useEffect(() => { setCountySearch(''); }, [pickerState]);

  // Fetch counties for a state the first time it's selected
  useEffect(() => {
    if (!pickerState) return;
    if (countyCache[pickerState] || statusByState[pickerState] === 'loading') return;

    let cancelled = false;
    async function fetchCounties() {
      setStatusByState(prev => ({ ...prev, [pickerState]: 'loading' }));
      setErrorByState(prev => ({ ...prev, [pickerState]: null }));

      // Try years in order: most stable first (2023), then fall back
      const yearsToTry = [2023, 2022, 2021];
      let lastError = null;

      for (const year of yearsToTry) {
        try {
          const url = `https://api.census.gov/data/${year}/acs/acs5?get=NAME&for=county:*&in=state:${pickerState}`;
          const res = await fetch(url);
          if (cancelled) return;

          if (!res.ok) {
            lastError = `HTTP ${res.status}`;
            continue;
          }

          const rows = await res.json();
          if (cancelled) return;

          if (!Array.isArray(rows) || rows.length < 2) {
            lastError = 'Empty response';
            continue;
          }

          // First row is headers: ["NAME", "state", "county"]
          const headers = rows[0];
          const nameIdx = headers.indexOf('NAME');
          const countyIdx = headers.indexOf('county');

          if (nameIdx === -1 || countyIdx === -1) {
            lastError = 'Unexpected response format';
            continue;
          }

          const counties = rows.slice(1)
            .map(r => ({
              fips: r[countyIdx],
              name: (r[nameIdx] || '').split(',')[0].replace(/\s+County$/i, '').replace(/\s+Parish$/i, '').replace(/\s+Borough$/i, '').replace(/\s+Census Area$/i, ''),
              fullName: (r[nameIdx] || '').split(',')[0],
            }))
            .filter(c => c.fips && c.fullName)
            .sort((a, b) => a.fullName.localeCompare(b.fullName));

          setCountyCache(prev => ({ ...prev, [pickerState]: counties }));
          setStatusByState(prev => ({ ...prev, [pickerState]: 'ready' }));
          return;
        } catch (e) {
          if (cancelled) return;
          lastError = e.message || 'Network error';
        }
      }

      // All attempts failed
      setStatusByState(prev => ({ ...prev, [pickerState]: 'error' }));
      setErrorByState(prev => ({ ...prev, [pickerState]: lastError || 'Failed to load counties' }));
    }

    fetchCounties();
    return () => { cancelled = true; };
  }, [pickerState]);

  const counties = pickerState ? (countyCache[pickerState] || []) : [];

  // Filter counties by search query (case-insensitive, matches name or FIPS)
  const filteredCounties = useMemo(() => {
    if (!countySearch.trim()) return counties;
    const q = countySearch.toLowerCase().trim();
    return counties.filter(c =>
      c.fullName.toLowerCase().includes(q) || c.fips.includes(q)
    );
  }, [counties, countySearch]);
  const status = pickerState ? statusByState[pickerState] : null;
  const stateError = pickerState ? errorByState[pickerState] : null;

  const isSelected = (stateFips, countyFips) =>
    countyRefs.some(r => r.stateFips === stateFips && r.countyFips === countyFips);

  function toggleCounty(stateFips, countyFips, fullName) {
    const stateName = STATES.find(s => s.fips === stateFips)?.name || '';
    const already = isSelected(stateFips, countyFips);

    if (multi) {
      // Multi mode: toggle in/out of the array
      if (already) {
        setCountyRefs(countyRefs.filter(r => !(r.stateFips === stateFips && r.countyFips === countyFips)));
      } else {
        setCountyRefs([...countyRefs, { stateFips, countyFips, name: `${fullName}, ${stateName}` }]);
      }
    } else {
      // Single mode: replace current selection and auto-confirm
      setCountyRefs([{ stateFips, countyFips, name: `${fullName}, ${stateName}` }]);
      onConfirm?.();
    }
  }

  return (
    <div className="fadein">
      <label className="mono text-[10px] uppercase tracking-widest text-stone-500 block mb-2">Browse by state</label>
      <select
        value={pickerState}
        onChange={e => setPickerState(e.target.value)}
        className="w-full px-3 py-2 border hairline bg-white rounded-sm text-sm focus:outline-none focus:hairline-strong mb-3"
      >
        <option value="">— Select a state to see its counties —</option>
        {STATES.map(s => (<option key={s.fips} value={s.fips}>{s.name}</option>))}
      </select>

      {pickerState && status === 'loading' && (
        <div className="text-xs text-stone-500 flex items-center gap-2 py-3 px-3 border hairline rounded-sm bg-white mb-3">
          <Loader2 className="w-3.5 h-3.5 animate-spin" /> Loading counties for {STATES.find(s => s.fips === pickerState)?.name}…
        </div>
      )}

      {pickerState && status === 'error' && (
        <div className="text-xs text-red-700 bg-red-50 border border-red-200 p-3 rounded-sm mb-3">
          <div className="font-medium mb-1 flex items-center gap-1.5"><AlertCircle className="w-3.5 h-3.5" /> Could not load counties</div>
          <div className="mono text-[10px] leading-relaxed">{stateError}</div>
          <button
            onClick={() => {
              setStatusByState(prev => { const n = { ...prev }; delete n[pickerState]; return n; });
              setCountyCache(prev => { const n = { ...prev }; delete n[pickerState]; return n; });
              // Force re-trigger by toggling
              const s = pickerState;
              setPickerState('');
              setTimeout(() => setPickerState(s), 0);
            }}
            className="mt-2 text-[11px] underline underline-offset-2 hover:text-red-900"
          >Retry</button>
        </div>
      )}

      {pickerState && status === 'ready' && counties.length > 0 && (
        <div className="mb-4">
          {/* Search box */}
          <div className="relative mb-2">
            <Search className="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400" />
            <input
              type="text"
              value={countySearch}
              onChange={e => setCountySearch(e.target.value)}
              placeholder={`Search ${counties.length} counties…`}
              className="w-full pl-8 pr-8 py-1.5 border hairline bg-white rounded-sm text-[12px] focus:outline-none focus:hairline-strong"
            />
            {countySearch && (
              <button
                onClick={() => setCountySearch('')}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-900"
                title="Clear search"
              >
                <X className="w-3.5 h-3.5" />
              </button>
            )}
          </div>

          <div className="flex items-center justify-between mb-1.5">
            <div className="mono text-[10px] uppercase tracking-widest text-stone-500">
              {countySearch ? (
                <>{filteredCounties.length} of {counties.length} counties · {STATES.find(s => s.fips === pickerState)?.name}</>
              ) : (
                <>{counties.length} counties in {STATES.find(s => s.fips === pickerState)?.name}</>
              )}
            </div>
            <button
              onClick={() => {
                // Select all currently visible (filtered) counties
                const newRefs = [...countyRefs];
                const existing = new Set(countyRefs.filter(r => r.stateFips === pickerState).map(r => r.countyFips));
                filteredCounties.forEach(c => {
                  if (!existing.has(c.fips)) {
                    newRefs.push({
                      stateFips: pickerState,
                      countyFips: c.fips,
                      name: `${c.fullName}, ${STATES.find(s => s.fips === pickerState)?.name}`,
                    });
                  }
                });
                setCountyRefs(newRefs);
              }}
              className="text-[11px] text-stone-600 hover:text-stone-900 underline underline-offset-2"
              disabled={filteredCounties.length === 0}
            >{countySearch ? `Select ${filteredCounties.length} matching` : 'Select all'}</button>
          </div>

          {filteredCounties.length === 0 ? (
            <div className="border hairline rounded-sm py-6 px-3 bg-white text-center text-[12px] text-stone-500 italic">
              No counties match "{countySearch}".
            </div>
          ) : (
            <div className="border hairline rounded-sm max-h-64 overflow-y-auto scrollbar-thin bg-white">
              <div className="divide-y hairline">
                {filteredCounties.map(c => {
                  const selected = isSelected(pickerState, c.fips);
                  return (
                    <label
                      key={c.fips}
                      className={`flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-stone-50 ${selected ? 'bg-stone-100' : ''}`}
                    >
                      <div className={`w-3.5 h-3.5 border flex items-center justify-center flex-shrink-0 ${selected ? 'bg-stone-900 border-stone-900' : 'border-stone-400'}`}>
                        {selected && <Check className="w-2.5 h-2.5 text-stone-50" />}
                      </div>
                      <input
                        type="checkbox"
                        checked={selected}
                        onChange={() => toggleCounty(pickerState, c.fips, c.fullName)}
                        className="hidden"
                      />
                      <div className="flex-1 text-[13px] text-stone-800">{c.fullName}</div>
                      <div className="mono text-[10px] text-stone-400">{pickerState}{c.fips}</div>
                    </label>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {countyRefs.length > 0 && (
        <div>
          <div className="mono text-[10px] uppercase tracking-widest text-stone-500 mb-2">
            {countyRefs.length} selected{multi ? ' · counties from different states can be combined' : ''}
          </div>
          <div className="flex flex-wrap gap-1.5 mb-3">
            {countyRefs.map(r => (
              <span
                key={`${r.stateFips}${r.countyFips}`}
                className="inline-flex items-center gap-1.5 px-2 py-1 bg-white border hairline rounded-sm text-[11px]"
              >
                <span>{r.name}</span>
                <button
                  onClick={() => setCountyRefs(countyRefs.filter(x => !(x.stateFips === r.stateFips && x.countyFips === r.countyFips)))}
                  className="text-stone-400 hover:text-stone-900"
                ><X className="w-3 h-3" /></button>
              </span>
            ))}
            {multi && countyRefs.length > 0 && (
              <button
                onClick={() => setCountyRefs([])}
                className="text-[11px] text-stone-500 hover:text-red-700 underline underline-offset-2 px-2 py-1"
              >Clear all</button>
            )}
          </div>

          {/* Done / Edit buttons — only for multi mode */}
          {multi && !confirmed && (
            <button
              onClick={onConfirm}
              className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-4 py-2 bg-stone-900 text-stone-50 rounded-sm hover:bg-stone-800 lift text-sm"
            >
              <Check className="w-3.5 h-3.5" /> Done selecting — continue to variables
              <ArrowRight className="w-3.5 h-3.5" />
            </button>
          )}

          {multi && confirmed && (
            <div className="flex items-center gap-2 flex-wrap">
              <div className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 border border-emerald-300 rounded-sm text-[11px] text-emerald-900">
                <Check className="w-3 h-3" /> Selection confirmed
              </div>
              <button
                onClick={onEditAgain}
                className="text-[11px] text-stone-600 hover:text-stone-900 underline underline-offset-2"
              >Edit selection</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MSAPicker({ msaCodes, setMsaCodes, multi, confirmed, onConfirm, onEditAgain }) {
  const [query, setQuery] = useState('');
  const [showDropdown, setShowDropdown] = useState(false);
  const [dropdownRect, setDropdownRect] = useState(null);
  const inputRef = useRef(null);
  const dropdownRef = useRef(null);

  const matches = useMemo(() => {
    const entries = Object.entries(MSA_COUNTIES).map(([code, info]) => ({ code, ...info }));
    const selectedSet = new Set(msaCodes);
    // In multi mode, filter out already-selected MSAs from the dropdown
    const filtered = multi ? entries.filter(e => !selectedSet.has(e.code)) : entries;
    if (!query.trim()) return filtered.slice(0, 20);
    const q = query.toLowerCase();
    return filtered.filter(m => m.name.toLowerCase().includes(q) || m.code.includes(q)).slice(0, 30);
  }, [query, msaCodes, multi]);

  // Track input position for fixed-position dropdown (escapes parent overflow:hidden)
  useEffect(() => {
    if (!showDropdown || !inputRef.current) return;
    function updateRect() {
      const rect = inputRef.current?.getBoundingClientRect();
      if (rect) setDropdownRect({ top: rect.bottom + 4, left: rect.left, width: rect.width });
    }
    updateRect();
    window.addEventListener('scroll', updateRect, true);
    window.addEventListener('resize', updateRect);
    return () => {
      window.removeEventListener('scroll', updateRect, true);
      window.removeEventListener('resize', updateRect);
    };
  }, [showDropdown]);

  // Close dropdown when clicking outside
  useEffect(() => {
    if (!showDropdown) return;
    function onClickOutside(e) {
      if (
        inputRef.current && !inputRef.current.contains(e.target) &&
        dropdownRef.current && !dropdownRef.current.contains(e.target)
      ) {
        setShowDropdown(false);
      }
    }
    document.addEventListener('mousedown', onClickOutside);
    return () => document.removeEventListener('mousedown', onClickOutside);
  }, [showDropdown]);

  function pickMSA(code) {
    if (multi) {
      // Add to array if not already there
      if (!msaCodes.includes(code)) setMsaCodes([...msaCodes, code]);
    } else {
      // Single mode: replace + auto-confirm
      setMsaCodes([code]);
      onConfirm?.();
    }
    setQuery('');
    setShowDropdown(false);
  }

  function removeMSA(code) {
    setMsaCodes(msaCodes.filter(c => c !== code));
  }

  // Single-mode display when selected
  const singleSelected = !multi && msaCodes.length === 1 ? MSA_COUNTIES[msaCodes[0]] : null;

  return (
    <div className="fadein">
      <label className="mono text-[10px] uppercase tracking-widest text-stone-500 block mb-2">
        {multi ? 'Metro / Micropolitan Areas' : 'Metro / Micropolitan Area'}
      </label>

      {singleSelected ? (
        <div className="border hairline-strong bg-white p-3 rounded-sm mb-2">
          <div className="flex items-baseline justify-between gap-3 flex-wrap">
            <div className="flex-1 min-w-0">
              <div className="serif text-base leading-tight">{singleSelected.name}</div>
              <div className="mono text-[10px] text-stone-500 mt-1">CBSA {msaCodes[0]} · {singleSelected.counties.length} counties</div>
            </div>
            <button onClick={() => setMsaCodes([])}
              className="text-xs text-stone-500 hover:text-stone-900 underline underline-offset-2">change</button>
          </div>
          <details className="mt-2">
            <summary className="cursor-pointer text-[11px] text-stone-500 hover:text-stone-900 select-none">See counties included</summary>
            <div className="mt-2 mono text-[10px] text-stone-600 leading-relaxed">
              {singleSelected.counties.join(', ')}
            </div>
          </details>
        </div>
      ) : (
        <>
          {/* Search input */}
          <div className="relative mb-3">
            <Search className="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" />
            <input
              ref={inputRef}
              type="text"
              value={query}
              onChange={e => { setQuery(e.target.value); setShowDropdown(true); }}
              onFocus={() => setShowDropdown(true)}
              placeholder="Search: Houston, Atlanta, Memphis, Jackson…"
              className="w-full pl-9 pr-3 py-2 border hairline bg-white rounded-sm text-sm focus:outline-none focus:hairline-strong"
            />
          </div>

          {/* Fixed-position dropdown — renders outside overflow:hidden parents */}
          {showDropdown && matches.length > 0 && dropdownRect && (
            <div
              ref={dropdownRef}
              className="max-h-64 overflow-y-auto scrollbar-thin border hairline-strong bg-white rounded-sm shadow-lg"
              style={{
                position: 'fixed',
                top: `${dropdownRect.top}px`,
                left: `${dropdownRect.left}px`,
                width: `${dropdownRect.width}px`,
                zIndex: 50,
              }}
            >
              {matches.map(m => (
                <button
                  key={m.code}
                  onClick={() => pickMSA(m.code)}
                  className="w-full text-left px-3 py-2 hover:bg-stone-100 border-b hairline last:border-b-0"
                >
                  <div className="text-[13px] text-stone-900">{m.name}</div>
                  <div className="mono text-[10px] text-stone-500 mt-0.5">CBSA {m.code} · {m.counties.length} counties</div>
                </button>
              ))}
            </div>
          )}

          {showDropdown && matches.length === 0 && dropdownRect && (
            <div
              ref={dropdownRef}
              className="border hairline-strong bg-white rounded-sm shadow-lg p-3 text-[12px] text-stone-500 italic"
              style={{
                position: 'fixed',
                top: `${dropdownRect.top}px`,
                left: `${dropdownRect.left}px`,
                width: `${dropdownRect.width}px`,
                zIndex: 50,
              }}
            >
              {multi && msaCodes.length > 0 ? 'No more matches — all matching MSAs are already selected.' : 'No MSAs match.'}
            </div>
          )}

          <div className="text-[11px] text-stone-500 leading-relaxed">
            Only the ~75 largest MSAs are indexed for direct selection. For smaller CBSAs, use multi-county selection above.
          </div>
        </>
      )}

      {/* Multi-mode chips + confirm step */}
      {multi && msaCodes.length > 0 && (
        <div className="mt-4">
          <div className="mono text-[10px] uppercase tracking-widest text-stone-500 mb-2">
            {msaCodes.length} MSA{msaCodes.length > 1 ? 's' : ''} selected · totals{' '}
            {msaCodes.reduce((sum, c) => sum + (MSA_COUNTIES[c]?.counties.length || 0), 0)} counties
          </div>
          <div className="flex flex-wrap gap-1.5 mb-3">
            {msaCodes.map(code => {
              const msa = MSA_COUNTIES[code];
              if (!msa) return null;
              return (
                <span
                  key={code}
                  className="inline-flex items-center gap-1.5 px-2 py-1 bg-white border hairline rounded-sm text-[11px]"
                >
                  <span className="truncate max-w-xs">{msa.name.split(',')[0]}</span>
                  <span className="mono text-[9px] text-stone-400">{code}</span>
                  <button
                    onClick={() => removeMSA(code)}
                    className="text-stone-400 hover:text-stone-900"
                  ><X className="w-3 h-3" /></button>
                </span>
              );
            })}
            {msaCodes.length > 0 && (
              <button
                onClick={() => setMsaCodes([])}
                className="text-[11px] text-stone-500 hover:text-red-700 underline underline-offset-2 px-2 py-1"
              >Clear all</button>
            )}
          </div>

          {!confirmed && (
            <button
              onClick={onConfirm}
              className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-4 py-2 bg-stone-900 text-stone-50 rounded-sm hover:bg-stone-800 lift text-sm"
            >
              <Check className="w-3.5 h-3.5" /> Done selecting — continue to variables
              <ArrowRight className="w-3.5 h-3.5" />
            </button>
          )}

          {confirmed && (
            <div className="flex items-center gap-2 flex-wrap">
              <div className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 border border-emerald-300 rounded-sm text-[11px] text-emerald-900">
                <Check className="w-3 h-3" /> Selection confirmed
              </div>
              <button
                onClick={onEditAgain}
                className="text-[11px] text-stone-600 hover:text-stone-900 underline underline-offset-2"
              >Edit selection</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function FilterScopeSummary({ filterScope }) {
  if (!filterScope || filterScope.type === 'none') return null;
  if (filterScope.type === 'state') {
    const s = STATES.find(x => x.fips === filterScope.stateFips);
    return <span>Statewide · {s?.name}</span>;
  }
  if (filterScope.type === 'counties') {
    return <span>{filterScope.countyRefs?.length || 0} counties</span>;
  }
  if (filterScope.type === 'msa') {
    const codes = filterScope.msaCodes || (filterScope.msaCode ? [filterScope.msaCode] : []);
    if (codes.length === 0) return null;
    if (codes.length === 1) {
      const msa = MSA_COUNTIES[codes[0]];
      if (!msa) return null;
      return <span>MSA · {msa.name.split(',')[0]}</span>;
    }
    return <span>{codes.length} MSAs</span>;
  }
  return null;
}

        <button onClick={onCancel} className="text-[11px] text-stone-500 hover:text-stone-900">close</button>
      </div>
      <Q label="How current does the data need to be?" k="recency" options={[['most_current', 'Most current available'], ['stable_ok', 'A stable estimate is fine']]} />
      <Q label="What size area are you analyzing?" k="geoSize" options={[['small', 'Small (tract, block group, small town)'], ['large', 'Large (city ≥65k, county, metro, state)']]} />
      <Q label="Do you need data at the census block level?" k="needsBlocks" options={[[true, 'Yes'], [false, 'No']]} />
      <Q label="Primary focus of the analysis?" k="focus" options={[['general', 'General demographics & socioeconomics'], ['race_ethnicity_total', 'Race/ethnicity total counts'], ['housing_econ', 'Housing, income, transportation']]} />
      {rec && (
        <div className="mt-5 pt-4 border-t hairline">
          <div className="mono text-[10px] uppercase tracking-widest text-stone-500 mb-1">Recommended</div>
          <div className="serif text-lg mb-1">{DATASETS[rec].label}</div>
          <div className="text-xs text-stone-600 mb-4">{DATASETS[rec].tradeoff}</div>
          <button onClick={onApply}
            className="inline-flex items-center gap-2 px-4 py-2 bg-stone-900 text-stone-50 text-xs rounded-sm hover:bg-stone-800 lift">
            Use this dataset <ChevronRight className="w-3.5 h-3.5" />
          </button>
        </div>
      )}
    </div>
  );
}

function PreviewTable({ data, varLabelMap }) {
  const [headers, ...rows] = data;
  const previewRows = rows.slice(0, 10);
  return (
    <div className="overflow-x-auto -mx-2 scrollbar-thin">
      <table className="w-full text-[11px]">
        <thead>
          <tr className="border-b hairline-strong">
            {headers.map((h, i) => (
              <th key={i} className="text-left py-2 px-2 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal whitespace-nowrap">
                <div>{varLabelMap[h] || h}</div>
                {varLabelMap[h] && <div className="mono text-[8px] text-stone-400 normal-case mt-0.5">{h}</div>}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {previewRows.map((row, ri) => (
            <tr key={ri} className="border-b hairline hover:bg-stone-50">
              {row.map((cell, ci) => {
                const isNumeric = headers[ci] !== 'NAME' && !isNaN(parseFloat(cell));
                const num = parseFloat(cell);
                const display = isNumeric && !isNaN(num) ? num.toLocaleString() : cell;
                const isNegative = isNumeric && num < 0;
                return (
                  <td key={ci} className={`py-2 px-2 align-top ${isNumeric ? 'mono text-right' : ''} ${isNegative ? 'text-stone-400 italic' : 'text-stone-800'}`}>
                    {isNegative ? '—' : display}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      {rows.length > 10 && (
        <div className="text-[10px] text-stone-500 mt-3 px-2 italic">
          Showing first 10 of {rows.length.toLocaleString()} rows. Negative values are Census-reserved suppression codes. Use the CSV download for the full result set.
        </div>
      )}
    </div>
  );
}

function ShapefileExport({ shapefile }) {
  const [copied, setCopied] = useState(false);
  function copyUrl() {
    navigator.clipboard.writeText(shapefile.url);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }
  return (
    <div className="space-y-4">
      <div className="text-xs text-stone-700 leading-relaxed">
        Download the matching TIGER/Line shapefile and join it to your CSV in QGIS or ArcGIS using the <span className="mono bg-stone-200 px-1 py-0.5 text-[10px]">GEOID</span> field. Boundary vintage: <span className="mono">{shapefile.tigerYear}</span> · Scope: <span className="font-medium">{shapefile.scope}</span>.
      </div>
      <div className="flex items-center gap-2 flex-wrap">
        <a href={shapefile.url} target="_blank" rel="noopener noreferrer"
          className="inline-flex items-center gap-1.5 px-3 py-2 border hairline-strong bg-white text-stone-900 rounded-sm hover:bg-stone-100 lift text-xs">
          <Download className="w-3.5 h-3.5" /> Download shapefile (.zip)
          <ExternalLink className="w-3 h-3 opacity-60" />
        </a>
        <button onClick={copyUrl}
          className="inline-flex items-center gap-1.5 px-3 py-2 border hairline rounded-sm hover:bg-white lift text-xs">
          {copied ? <Check className="w-3.5 h-3.5" /> : <Copy className="w-3.5 h-3.5" />}
          {copied ? 'Copied' : 'Copy URL'}
        </button>
      </div>
      <details className="text-[11px] text-stone-600">
        <summary className="cursor-pointer hover:text-stone-900 select-none flex items-center gap-1.5">
          <FileText className="w-3 h-3" /> How to join in GIS
        </summary>
        <div className="pl-4 pt-2 leading-relaxed space-y-1.5">
          <div>1. Unzip the TIGER shapefile and load it into your GIS.</div>
          <div>2. The shapefile's <span className="mono">GEOID</span> field matches the concatenated <span className="mono">state + county + tract + block group + block</span> codes in your CSV.</div>
          <div>3. Use a table join (QGIS: <em>Properties → Joins</em>; ArcGIS: <em>Joins and Relates</em>) on GEOID to attach the data.</div>
          <div>4. Save as a new layer or export to GeoPackage / GeoJSON.</div>
        </div>
      </details>
      <div className="text-[10px] text-stone-500 mono break-all bg-stone-100 p-2 rounded-sm">{shapefile.url}</div>
    </div>
  );
}

function VariableSearchModal({ onClose, loading, error, catalog, query, setQuery, filtered, selectedVars, toggleVar, datasetLabel, year }) {
  const inputRef = useRef(null);
  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 bg-stone-900/40 backdrop-blur-sm flex items-start justify-center p-4 md:p-12 fadein">
      <div className="bg-stone-50 border hairline-strong rounded-sm shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
        <div className="border-b hairline-strong px-6 py-4 flex items-center justify-between">
          <div>
            <div className="serif text-xl">Variable Catalog</div>
            <div className="mono text-[10px] uppercase tracking-widest text-stone-500 mt-1">
              {datasetLabel} · {year} · {catalog ? `${catalog.length.toLocaleString()} variables` : 'loading…'}
            </div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-stone-100 rounded-sm"><X className="w-4 h-4" /></button>
        </div>
        <div className="px-6 py-4 border-b hairline">
          <div className="relative">
            <Search className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" />
            <input ref={inputRef} type="text" value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Try: median income, vehicles available, commute time, B19013..."
              className="w-full pl-10 pr-3 py-2.5 border hairline bg-white rounded-sm text-sm focus:outline-none focus:hairline-strong" />
          </div>
          <div className="text-[11px] text-stone-500 mt-2">
            Search by keyword, concept, or variable code. Multiple keywords combined with AND.
          </div>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-thin px-6 py-4">
          {loading && (
            <div className="flex items-center gap-3 text-stone-500 text-sm py-8 justify-center">
              <Loader2 className="w-4 h-4 animate-spin" /> Loading the full variable catalog…
            </div>
          )}
          {error && (
            <div className="text-xs text-red-700 bg-red-50 border border-red-200 p-3 rounded-sm">
              <div className="font-medium mb-1">Failed to load catalog</div>
              <div className="mono text-[10px]">{error}</div>
            </div>
          )}
          {!loading && !error && catalog && !query.trim() && (
            <div className="text-center py-12 text-stone-500">
              <Search className="w-8 h-8 mx-auto mb-3 opacity-30" />
              <div className="text-sm serif italic">Type to search {catalog.length.toLocaleString()} variables.</div>
            </div>
          )}
          {!loading && !error && catalog && query.trim() && filtered.length === 0 && (
            <div className="text-center py-12 text-stone-500"><div className="text-sm">No matches for "{query}".</div></div>
          )}
          {!loading && filtered.length > 0 && (
            <div className="space-y-1">
              {filtered.map(v => {
                const checked = !!selectedVars.find(s => s.code === v.code);
                return (
                  <label key={v.code}
                    className={`flex items-start gap-3 px-3 py-2.5 border rounded-sm cursor-pointer lift ${checked ? 'hairline-strong bg-white' : 'hairline bg-white/60 hover:bg-white'}`}>
                    <div className={`w-4 h-4 mt-0.5 border flex items-center justify-center flex-shrink-0 ${checked ? 'bg-stone-900 border-stone-900' : 'border-stone-400'}`}>
                      {checked && <Check className="w-3 h-3 text-stone-50" />}
                    </div>
                    <input type="checkbox" checked={checked}
                      onChange={() => toggleVar({ code: v.code, label: `${v.concept}: ${v.label}`, tableId: v.tableId, universe: inferUniverseFromConcept(v.concept) })}
                      className="hidden" />
                    <div className="flex-1 min-w-0">
                      <div className="text-[11px] text-stone-500 mb-0.5">{v.concept}</div>
                      <div className="text-sm leading-snug text-stone-900">{v.label}</div>
                    </div>
                    <div className="mono text-[10px] text-stone-400 flex-shrink-0 mt-0.5">{v.code}</div>
                  </label>
                );
              })}
              {filtered.length === 100 && (
                <div className="text-[10px] text-stone-500 text-center py-3 italic">Showing first 100 matches. Refine your search to narrow further.</div>
              )}
            </div>
          )}
        </div>
        <div className="border-t hairline-strong px-6 py-3 flex items-center justify-between bg-white">
          <div className="text-[11px] text-stone-500">
            <span className="font-medium text-stone-900">{selectedVars.length}</span> variable{selectedVars.length !== 1 ? 's' : ''} selected
          </div>
          <button onClick={onClose}
            className="inline-flex items-center gap-1.5 px-4 py-2 bg-stone-900 text-stone-50 rounded-sm hover:bg-stone-800 lift text-xs">
            Done <ArrowRight className="w-3.5 h-3.5" />
          </button>
        </div>
      </div>
    </div>
  );
}

<script>
  // Wait until both (a) the ES module bootstrap has exposed React/Lucide globally
  // AND (b) Babel Standalone is loaded, then transpile and execute our component source.
  function ready() {
    const source = document.getElementById('app-source').textContent;
    try {
      const out = Babel.transform(source, {
        presets: ['react'],
        // No module transform needed — our source has no imports after processing.
      }).code;
      // Execute in global scope so `CensusExplorer` is reachable.
      new Function(out)();
    } catch (err) {
      console.error('Failed to transpile or execute component:', err);
      const root = document.getElementById('root');
      const ls = document.getElementById('loading-screen');
      if (ls) ls.remove();
      root.innerHTML =
        '<div style="max-width:640px; margin:80px auto; padding:24px; border:1px solid #1c1917; font-family:Georgia,serif;">' +
          '<h2 style="margin:0 0 12px 0;">Something went wrong loading the app.</h2>' +
          '<p style="margin:0 0 12px 0; color:#57534e;">Open the browser console for details.</p>' +
          '<pre style="background:#f5f5f4; padding:12px; font-size:12px; overflow:auto; color:#b91c1c;">' +
            (err && err.stack ? err.stack : String(err)) +
          '</pre>' +
        '</div>';
    }
  }

  let modulesReady = !!(window.React && window.ReactDOM && window.__lucide);
  let babelReady = !!window.Babel;

  function maybeStart() { if (modulesReady && babelReady) ready(); }

  if (!modulesReady) {
    window.addEventListener('modules-ready', () => { modulesReady = true; maybeStart(); });
  }
  if (!babelReady) {
    const check = setInterval(() => {
      if (window.Babel) { babelReady = true; clearInterval(check); maybeStart(); }
    }, 30);
  }
  maybeStart();
</script>
